theme: jekyll-theme-chirpy

lang: ko
timezone: Asia/Seoul

title: idean3885
tagline: 의사결정 흔적과 트레이드오프 기록
description: >-
  팀 상황 안에서의 트레이드오프와 정량 의사결정에 관심이 많은
  7년차 백엔드 개발자의 기록.
  GPU 기반 PaaS, 시계열 파이프라인, 자동화 시스템 사례를 정리합니다.

url: "https://blog.idean.me"
baseurl: ""

github:
  username: idean3885

author:
  name: idean3885
  url: https://github.com/idean3885
logo: /assets/img/favicons/favicon-96x96.png

social:
  name: idean3885
  links:
    - https://github.com/idean3885

analytics:
  google:
    id: G-HRWXK11B6L

webmaster_verifications:
  google: Sic-7OtszjG2RvrNOMRqlluzszDzg_vuCy7t4Q_GHzQ

avatar: /assets/img/avatar.PNG

social_preview_image: /assets/img/og-image.png

comments:
  provider: giscus
  giscus:
    repo: idean3885/idean3885.github.io
    repo_id: R_kgDORQ49gw
    category: General
    category_id: DIC_kwDORQ49g84C59HT
    mapping: pathname
    lang: ko
    input_position: bottom
    reactions_enabled: 1

theme_mode: light

toc: true
paginate: 10

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _tabs
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - package*.json

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

# _config.yml에 추가 또는 수정
plugins:
  - jekyll-feed
  - jekyll-sitemap

